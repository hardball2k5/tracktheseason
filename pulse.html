<style>
:root{
  --ink:#0f1014;--ink2:#1a1d24;--ink3:#252830;
  --chalk:#8a8a82;--rule:rgba(255,255,255,.07);--rule2:rgba(255,255,255,.04);
  --signal:#1aff6b;--gain-text:#4ecb77;--loss-text:#f47570;--caution-text:#f9d96e;
  --logo-bg:#fff;--logo-border:rgba(0,0,0,.1);--logo-shadow:0 2px 8px rgba(0,0,0,.18);
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-pill:999px;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;overflow-x:hidden}
body{font-family:var(--sans);background:var(--ink);color:#e8edf8;min-height:100vh;
  background-image:radial-gradient(ellipse 100% 35% at 50% -2%,rgba(26,255,107,.06) 0%,transparent 60%)}
.nav{padding:11px 0;border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:100;
  background:rgba(15,16,20,.96);backdrop-filter:blur(16px)}
.nav-inner{max-width:860px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:10px}
.back-btn{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:12px;
  font-weight:600;color:var(--chalk);text-decoration:none;border:1px solid var(--rule);
  border-radius:var(--r-sm);padding:5px 11px;transition:all .13s}
.back-btn:hover{border-color:rgba(255,255,255,.2);color:#e8edf8}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-left:auto}
.nav-mono{width:28px;height:28px;background:var(--signal);border-radius:5px;
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);
  font-size:10px;font-weight:700;color:var(--ink)}
.nav-word{font-family:var(--mono);font-size:13px;font-weight:700;color:#e8edf8}
.nav-word span{color:var(--signal)}
.wrap{max-width:860px;margin:0 auto;padding:0 16px 80px}
.breadcrumb{display:flex;align-items:center;gap:6px;padding:12px 0 0;
  font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.06em;flex-wrap:wrap}
.breadcrumb a{color:rgba(255,255,255,.25);text-decoration:none}
.breadcrumb a:hover{color:var(--signal)}

/* ── STATES ── */
.state-box{text-align:center;padding:64px 20px}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid var(--rule);
  border-top-color:var(--signal);animation:spin .75s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.state-label{font-family:var(--mono);font-size:13px;color:var(--chalk);margin-bottom:8px}
.state-sub{font-family:var(--sans);font-size:13px;color:rgba(255,255,255,.3);line-height:1.55;max-width:440px;margin:0 auto}

/* "Coming tomorrow" state */
.coming-soon{
  background:var(--ink2);border:1px solid rgba(26,255,107,.12);
  border-radius:var(--r-lg);padding:32px;text-align:center;margin-top:24px;
}
.cs-icon{font-size:40px;margin-bottom:16px}
.cs-title{font-family:var(--mono);font-size:22px;font-weight:700;color:#e8edf8;
  letter-spacing:-.02em;margin-bottom:10px}
.cs-body{font-family:var(--sans);font-size:15px;color:rgba(255,255,255,.5);
  line-height:1.6;max-width:520px;margin:0 auto 20px}
.cs-detail{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.25);
  letter-spacing:.06em;line-height:1.8}
.cs-btn{display:inline-flex;align-items:center;gap:6px;margin-top:18px;padding:10px 18px;
  border-radius:var(--r-sm);background:var(--signal);color:var(--ink);
  font-family:var(--mono);font-size:12px;font-weight:700;text-decoration:none;
  transition:filter .13s}
.cs-btn:hover{filter:brightness(1.08)}

/* ── PULSE ARTICLE ── */
.pulse-header{padding:20px 0 24px;border-bottom:1px solid var(--rule)}
.pulse-eyebrow{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.2em;
  text-transform:uppercase;color:var(--signal);margin-bottom:8px;
  display:flex;align-items:center;gap:8px}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--signal)}
.pulse-hed{font-family:var(--mono);font-size:clamp(22px,5vw,34px);font-weight:700;
  letter-spacing:-.03em;color:#e8edf8;line-height:1.15;margin-bottom:10px}
.pulse-summary{font-family:var(--sans);font-size:16px;color:rgba(255,255,255,.6);
  line-height:1.6;max-width:640px;margin-bottom:14px}
.pulse-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.3);margin-bottom:14px}
.pulse-date-nav{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.date-nav-btn{padding:5px 12px;border-radius:var(--r-pill);border:1px solid var(--rule);
  background:transparent;color:var(--chalk);font-family:var(--mono);font-size:11px;
  font-weight:600;cursor:pointer;transition:all .13s;text-decoration:none}
.date-nav-btn:hover{border-color:var(--signal);color:var(--signal)}
.date-nav-btn.active{background:var(--signal);border-color:var(--signal);color:var(--ink)}
.share-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.share-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;
  border-radius:var(--r-sm);font-family:var(--mono);font-size:11px;font-weight:700;
  cursor:pointer;transition:all .13s;text-decoration:none;white-space:nowrap}
.share-btn.primary{background:var(--signal);color:var(--ink);border:none}
.share-btn.primary:hover{filter:brightness(1.08)}
.share-btn.ghost{background:transparent;color:var(--chalk);border:1px solid var(--rule)}
.share-btn.ghost:hover{border-color:var(--signal);color:var(--signal)}

/* ── SECTIONS ── */
.pulse-section{padding:28px 0 0}
.sec-eyebrow{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.16em;
  text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:4px;
  display:flex;align-items:center;gap:8px}
.sec-eyebrow::after{content:'';flex:1;height:1px;background:var(--rule)}
.sec-title{font-family:var(--mono);font-size:20px;font-weight:700;color:#e8edf8;
  letter-spacing:-.02em;margin-bottom:14px}

/* ── MOVER CARDS ── */
.mover-list{display:flex;flex-direction:column;gap:8px}
.mover-card{background:var(--ink2);border:1px solid var(--rule);border-radius:var(--r-lg);
  padding:14px 16px;display:flex;align-items:center;gap:14px;
  text-decoration:none;color:inherit;transition:border-color .15s}
.mover-card:hover{border-color:rgba(26,255,107,.3)}
.mover-card.down:hover{border-color:rgba(244,117,112,.3)}
.mover-card.up{border-left:3px solid var(--signal)}
.mover-card.down{border-left:3px solid var(--loss-text)}
.mover-logo{width:42px;height:42px;flex-shrink:0;background:var(--logo-bg);
  border:1px solid var(--logo-border);border-radius:var(--r-sm);box-shadow:var(--logo-shadow);
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.mover-logo img{width:32px;height:32px;object-fit:contain}
.mover-body{flex:1;min-width:0}
.mover-name{font-family:var(--mono);font-size:16px;font-weight:700;color:#e8edf8;margin-bottom:2px}
.mover-sub{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.35)}
.mover-text{font-family:var(--sans);font-size:13px;color:rgba(255,255,255,.5);
  line-height:1.45;margin-top:4px}
.mover-delta{font-family:var(--mono);font-size:24px;font-weight:700;flex-shrink:0;
  letter-spacing:-.02em}
.mover-delta.up{color:var(--signal)}
.mover-delta.down{color:var(--loss-text)}

/* ── CHAOS DELTA ── */
.chaos-delta-card{
  background:rgba(26,255,107,.04);border:1px solid rgba(26,255,107,.12);
  border-radius:var(--r-lg);padding:20px;display:flex;gap:20px;
  align-items:center;flex-wrap:wrap;
}
.chaos-big{font-family:var(--mono);font-size:56px;font-weight:700;color:var(--signal);
  letter-spacing:-.04em;line-height:1;flex-shrink:0}
.chaos-body-text{flex:1;min-width:0}
.chaos-title-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.2em;
  text-transform:uppercase;color:var(--signal);margin-bottom:6px}
.chaos-desc{font-family:var(--sans);font-size:16px;color:rgba(255,255,255,.7);line-height:1.55}
.chaos-change{font-family:var(--mono);font-size:12px;font-weight:700;
  display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 12px;
  border-radius:var(--r-pill)}
.chaos-change.up{background:rgba(26,255,107,.1);color:var(--signal)}
.chaos-change.down{background:rgba(244,117,112,.1);color:var(--loss-text)}
.chaos-change.flat{background:rgba(255,255,255,.05);color:var(--chalk)}

/* ── RIVALRY DELTA ── */
.rivalry-delta-list{display:flex;flex-direction:column;gap:8px}
.rivalry-delta-card{background:var(--ink2);border:1px solid var(--rule);border-radius:var(--r-lg);
  padding:14px 16px;text-decoration:none;color:inherit;display:block;transition:border-color .15s}
.rivalry-delta-card:hover{border-color:rgba(26,255,107,.3)}
.rd-teams{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rd-logo{width:30px;height:30px;background:var(--logo-bg);border:1px solid var(--logo-border);
  border-radius:var(--r-sm);box-shadow:var(--logo-shadow);display:flex;align-items:center;
  justify-content:center;overflow:hidden}
.rd-logo img{width:22px;height:22px;object-fit:contain}
.rd-vs{font-family:var(--mono);font-size:11px;font-weight:700;color:rgba(255,255,255,.2)}
.rd-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:rgba(255,255,255,.3)}
.rd-narrative{font-family:var(--sans);font-size:14px;font-weight:600;color:#e8edf8;
  line-height:1.4;margin-bottom:6px}
.rd-narrative strong{color:var(--signal)}
.rd-delta{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.35)}
.rd-cta{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--signal);
  letter-spacing:.06em;margin-top:4px}

/* ── NUMBER OF THE DAY ── */
.notd{background:linear-gradient(135deg,rgba(26,255,107,.08) 0%,rgba(26,255,107,.02) 100%);
  border:1px solid rgba(26,255,107,.15);border-radius:var(--r-lg);padding:24px;text-align:center}
.notd-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.2em;
  text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:8px}
.notd-num{font-family:var(--mono);font-size:clamp(40px,9vw,72px);font-weight:700;
  color:var(--signal);letter-spacing:-.04em;line-height:1;margin-bottom:8px}
.notd-context{font-family:var(--mono);font-size:11px;color:rgba(26,255,107,.5);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.notd-text{font-family:var(--sans);font-size:15px;color:rgba(255,255,255,.6);line-height:1.55}

/* ── ARCHIVE NAV ── */
.archive-nav{background:var(--ink2);border:1px solid var(--rule);border-radius:var(--r-lg);
  padding:16px;margin-top:28px}
.archive-title{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:10px}
.archive-dates{display:flex;flex-wrap:wrap;gap:6px}
.archive-link{padding:5px 12px;border-radius:var(--r-pill);border:1px solid var(--rule);
  background:transparent;color:var(--chalk);font-family:var(--mono);font-size:11px;
  font-weight:600;text-decoration:none;transition:all .13s}
.archive-link:hover{border-color:var(--signal);color:var(--signal)}
.archive-link.current{background:var(--signal);border-color:var(--signal);color:var(--ink)}

.pulse-footer{border-top:1px solid var(--rule);padding:24px 0;margin-top:48px;
  font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.2);
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}
.pulse-footer a{color:rgba(255,255,255,.3);text-decoration:none}
.pulse-footer a:hover{color:var(--signal)}

@media(max-width:560px){
  .mover-card{flex-wrap:wrap}
  .chaos-delta-card{flex-direction:column;align-items:flex-start}
}
</style>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════════ */
const CURRENT_YEAR = new Date().getFullYear();
const TRACKER_BASE = 'tracker.html';
const SEASON_GAMES = 162;

const RIVALRY_DEFS = [
  {t1:147,t2:111,label:'AL East',  slug:'yankees-vs-red-sox'},
  {t1:143,t2:121,label:'NL East',  slug:'phillies-vs-mets'},
  {t1:143,t2:144,label:'NL East',  slug:'phillies-vs-braves'},
  {t1:119,t2:137,label:'NL West',  slug:'dodgers-vs-giants'},
  {t1:119,t2:135,label:'NL West',  slug:'dodgers-vs-padres'},
  {t1:112,t2:138,label:'NL Central',slug:'cubs-vs-cardinals'},
  {t1:144,t2:121,label:'NL East',  slug:'braves-vs-mets'},
  {t1:147,t2:121,label:'NYC',      slug:'yankees-vs-mets'},
  {t1:117,t2:140,label:'AL West',  slug:'astros-vs-rangers'},
];

/* ══ Helpers ══════════════════════════════════════════════ */
const logoImg  = (id,sz=32)=>
  `<img src="https://www.mlbstatic.com/team-logos/${id}.svg" width="${sz}" height="${sz}"
    style="object-fit:contain" onerror="this.style.display='none'"/>`;
const trackerUrl = (id,gp)=>`${TRACKER_BASE}?team=${id}&season=${CURRENT_YEAR}&rs=${Math.max(1,gp-29)}&re=${gp}`;
const fmt = d => new Date(d+'T12:00:00Z').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
const fmtShort = d => new Date(d+'T12:00:00Z').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

async function copyToClipboard(t){try{await navigator.clipboard.writeText(t);return true;}catch{window.prompt('Copy:',t);return false;}}

/* ══ Render helpers ════════════════════════════════════════ */
function setRoot(html){ document.getElementById('appRoot').innerHTML=html; }

function renderLoading(){
  setRoot(`<div class="state-box"><div class="spinner"></div><div class="state-label">Loading…</div></div>`);
}

function renderComingSoon(availableDates){
  const hasAny = availableDates && availableDates.length > 0;
  document.getElementById('bcDate').textContent = 'Coming Soon';
  setRoot(`<div class="coming-soon">
    <div class="cs-icon">📅</div>
    <div class="cs-title">Delta Tracking Starts Tomorrow</div>
    <div class="cs-body">
      The Daily Pulse shows <strong>what changed since yesterday</strong> — projected wins gained or lost,
      overnight movers, rivalry shifts, and Chaos Index movement.<br><br>
      The first snapshot runs tonight at 11pm ET. Check back tomorrow morning to see the first Pulse report.
    </div>
    <div class="cs-detail">
      SNAPSHOT CADENCE: NIGHTLY AT 11PM ET<br>
      FIRST PULSE: TOMORROW MORNING<br>
      HOMEPAGE: CURRENT LIVE PACE DATA
    </div>
    <a href="/" class="cs-btn">← See Live MLB Pace Dashboard</a>
  </div>
  ${hasAny ? renderArchiveNavHtml(availableDates, null) : ''}`);
}

function renderNotFound(date, availableDates){
  document.getElementById('bcDate').textContent = date;
  setRoot(`<div class="state-box">
    <div class="state-label">No Pulse found for ${date}</div>
    <div class="state-sub">This date either hasn't been stored yet or predates the archive.</div>
  </div>
  ${renderArchiveNavHtml(availableDates, date)}`);
}

function renderArchiveNavHtml(dates, current){
  if(!dates || !dates.length) return '';
  const links = dates.slice(0,14).map(d=>`
    <a class="archive-link ${d===current?'current':''}" href="/pulse/${d}">${fmtShort(d)}</a>
  `).join('');
  return `<div class="archive-nav">
    <div class="archive-title">📁 Archive — past reports</div>
    <div class="archive-dates">${links}</div>
  </div>`;
}

/* ══ Delta computations ════════════════════════════════════ */
function buildDeltas(snapshot, prevSnapshot){
  if(!prevSnapshot || !prevSnapshot.length) return null;
  const prevMap = new Map(prevSnapshot.map(t=>[t.teamId, t]));
  return snapshot.map(t=>{
    const prev = prevMap.get(t.teamId);
    if(!prev) return {...t, projDelta:null, chaosChange:null};
    const projDelta = (t.projWins != null && prev.projWins != null) ? t.projWins - prev.projWins : null;
    const chaosChange = t.chaosFlag - (prev.chaosFlag||0); // 1=entered chaos, -1=left
    return {...t, prev, projDelta, chaosChange};
  });
}

function generateHeadline(teams, date, chaosCount, prevChaosCount){
  const withDelta = teams.filter(t=>t.projDelta!=null).sort((a,b)=>b.projDelta-a.projDelta);
  const top    = withDelta[0];
  const bottom = withDelta[withDelta.length-1];
  const chaosDiff = chaosCount - (prevChaosCount||chaosCount);
  const topD   = top?.projDelta||0, botD = bottom?.projDelta||0;
  const topName = top?.teamName||'', botName = bottom?.teamName||'';

  if(Math.abs(chaosDiff)>=3)
    return `Chaos Index ${chaosDiff>0?'Surges':'Drops'} — ${chaosCount} Teams Now Off Prior-Year Pace`;
  if(topD>=3 && Math.abs(botD)>=3)
    return `${topName} Rise While ${botName} Slip — MLB's Biggest Overnight Swing`;
  if(topD>=3)
    return `${topName} Make the Biggest Move — +${topD} Projected Wins Overnight`;
  if(Math.abs(botD)>=3)
    return `${botName} Drop ${Math.abs(botD)} Projected Wins — The Biggest Overnight Fall`;
  if(topD>=2)
    return `${topName} Lead the Way After Last Night's Games`;
  return `MLB Daily Pulse — ${fmtShort(date)}`;
}

function generateSummary(teams, date, chaosCount, prevChaosCount){
  const chaosDiff = chaosCount - (prevChaosCount||chaosCount);
  const withDelta = teams.filter(t=>t.projDelta!=null).sort((a,b)=>b.projDelta-a.projDelta);
  const top = withDelta[0], bot = withDelta[withDelta.length-1];
  const gainers = withDelta.filter(t=>t.projDelta>0).length;
  const fallers = withDelta.filter(t=>t.projDelta<0).length;

  let s = '';
  if(gainers>0||fallers>0)
    s += `After last night's games, ${gainers} team${gainers!==1?'s':''} gained projected wins and ${fallers} fell. `;
  if(Math.abs(chaosDiff)>=1)
    s += `The Chaos Index ${chaosDiff>0?'rose to':'dropped to'} ${chaosCount} — ${chaosDiff>0?'more':'fewer'} teams tracking ±5W from last season. `;
  if(top?.projDelta>=2)
    s += `The ${top.teamName} made the biggest jump, gaining ${top.projDelta} projected win${top.projDelta!==1?'s':''}. `;
  if(bot?.projDelta<=-2)
    s += `The ${bot.teamName} had the sharpest drop, falling ${Math.abs(bot.projDelta)} projected win${Math.abs(bot.projDelta)!==1?'s':''}.`;
  return s.trim() || `A look at how every team's projected win pace shifted after ${fmtShort(date)}.`;
}

/* ══ Section renderers ══════════════════════════════════════ */
function renderMoversSection(teams, dir){
  const sorted = [...teams]
    .filter(t=>t.projDelta!=null)
    .sort((a,b)=> dir==='up' ? b.projDelta-a.projDelta : a.projDelta-b.projDelta)
    .slice(0,3);
  if(!sorted.length) return '<div style="color:var(--chalk);font-size:13px;font-family:var(--mono)">No significant movers.</div>';
  return sorted.map(t=>{
    const d = t.projDelta||0;
    if(dir==='up'&&d<=0) return '';
    if(dir==='down'&&d>=0) return '';
    const cls = dir==='up'?'up':'down';
    const sign = d>0?'+':'';
    const now = t.projWins!=null?`${t.projWins}W pace`:null;
    const prev = t.prev?.projWins!=null?`was ${t.prev.projWins}W`:null;
    const rec = t.wins!=null?`${t.wins}–${t.losses} · ${t.gp} GP`:'';
    const detail = t.delta!=null ? (t.delta>=0?`+${t.delta}W vs last season`:`${t.delta}W vs last season`) : '';
    const text = [now, prev, detail].filter(Boolean).join(' · ');
    return `<a class="mover-card ${cls}" href="${trackerUrl(t.teamId, t.gp||67)}">
      <div class="mover-logo">${logoImg(t.teamId,32)}</div>
      <div class="mover-body">
        <div class="mover-name">${t.teamName}</div>
        <div class="mover-sub">${rec}</div>
        <div class="mover-text">${text}</div>
      </div>
      <div class="mover-delta ${cls}">${sign}${d}W</div>
    </a>`;
  }).join('');
}

function renderChaosSection(chaosCount, prevChaosCount, gp){
  const diff = prevChaosCount!=null ? chaosCount - prevChaosCount : 0;
  const pct  = Math.round(chaosCount/30*100);
  const changeCls = diff>0?'up':diff<0?'down':'flat';
  const changeText = diff===0?'No change from yesterday'
    : diff>0?`▲ ${diff} more team${diff!==1?'s':''} than yesterday`
    :`▼ ${Math.abs(diff)} fewer team${Math.abs(diff)!==1?'s':''} than yesterday`;
  return `<div class="chaos-delta-card">
    <div class="chaos-big">${chaosCount}</div>
    <div class="chaos-body-text">
      <div class="chaos-title-label">Chaos Index · Through Game ${gp}</div>
      <div class="chaos-desc">${chaosCount} of 30 teams are tracking at least 5 wins differently than last season — ${pct}% of the league.</div>
      <div class="chaos-change ${changeCls}">${changeText}</div>
    </div>
  </div>`;
}

function renderRivalrySection(teams){
  const byId = new Map(teams.map(t=>[t.teamId,t]));
  const cards = RIVALRY_DEFS.map(r=>{
    const td1=byId.get(r.t1), td2=byId.get(r.t2);
    if(!td1||!td2||!td1.projWins||!td2.projWins) return null;
    const p1=td1.projWins, p2=td2.projWins, gap=Math.abs(p1-p2);
    if(gap<3) return null;
    const d1=td1.projDelta||0, d2=td2.projDelta||0;
    const deltaText = (d1!==0||d2!==0)
      ? `Gap ${Math.abs(d1-d2)>0?(d1>d2?'grew':'shrank')+' by '+(Math.abs(d1-d2))+'W overnight':' unchanged'}.`
      : '';
    const ahead=p1>=p2?td1:td2, aName=ahead.teamName;
    const narrative = gap>=15
      ? `<strong>${aName}</strong> dominate this rivalry — ${gap}W ahead in projected pace.`
      : gap>=8 ? `<strong>${aName}</strong> hold a clear ${gap}-win pace edge.`
      : `<strong>${aName}</strong> lead by ${gap} projected wins.`;
    return `<a class="rivalry-delta-card" href="/${r.slug}">
      <div class="rd-teams">
        <div class="rd-logo">${logoImg(r.t1,22)}</div>
        <div class="rd-vs">VS</div>
        <div class="rd-logo">${logoImg(r.t2,22)}</div>
        <div class="rd-label" style="margin-left:4px">${r.label}</div>
      </div>
      <div class="rd-narrative">${narrative}</div>
      ${deltaText?`<div class="rd-delta">${deltaText}</div>`:''}
      <div class="rd-cta">Full comparison →</div>
    </a>`;
  }).filter(Boolean).slice(0,3);
  return cards.join('') || '';
}

function renderNotdSection(teams, chaosCount, prevChaosCount){
  const withDelta = teams.filter(t=>t.projDelta!=null).sort((a,b)=>b.projDelta-a.projDelta);
  const top=withDelta[0], bot=withDelta[withDelta.length-1];
  const chaosDiff = prevChaosCount!=null ? chaosCount-prevChaosCount : null;

  let num, context, text;
  if(top?.projDelta>=3){
    num=`+${top.projDelta}W`; context='Projected wins gained overnight';
    text=`The ${top.teamName} gained ${top.projDelta} projected wins after last night's game. They're now tracking toward ${top.projWins||'—'} wins on the season.`;
  } else if(Math.abs(bot?.projDelta||0)>=3){
    num=`${bot.projDelta}W`; context='Projected wins lost overnight';
    text=`The ${bot.teamName} dropped ${Math.abs(bot.projDelta)} projected wins. They're now on pace for ${bot.projWins||'—'} wins — ${bot.delta!=null?(bot.delta>=0?`+${bot.delta}W`:`${bot.delta}W`)+' vs last season':''}`.trim()+'.';
  } else if(chaosDiff!==null&&Math.abs(chaosDiff)>=1){
    num=String(chaosCount); context='Teams off prior-year pace';
    text=`The Chaos Index ${chaosDiff>0?`rose by ${chaosDiff}`:`fell by ${Math.abs(chaosDiff)}`} today. ${chaosCount} teams are now tracking at least 5 wins differently than last season.`;
  } else {
    const pct=Math.round(chaosCount/30*100);
    num=`${pct}%`; context='Of MLB off prior-year pace';
    text=`${chaosCount} of 30 teams are tracking meaningfully differently than last season. The ${CURRENT_YEAR} standings alone don't tell the full story.`;
  }
  return `<div class="notd">
    <div class="notd-label">Number of the Day</div>
    <div class="notd-num">${num}</div>
    <div class="notd-context">${context}</div>
    <div class="notd-text">${text}</div>
  </div>`;
}

/* ══ Full article render ═══════════════════════════════════ */
function renderArticle(data){
  const {date, prevDate, snapshot, prevSnapshot, hasPrev, availableDates} = data;

  /* Compute deltas */
  const teams = hasPrev ? buildDeltas(snapshot, prevSnapshot) : snapshot.map(t=>({...t,projDelta:null,chaosChange:null}));
  const chaosCount     = teams.filter(t=>t.chaosFlag===1||t.chaosFlag==='1').length;
  const prevChaosCount = hasPrev
    ? (prevSnapshot||[]).filter(t=>t.chaosFlag===1||t.chaosFlag==='1').length
    : null;
  const gp = teams[0]?.gp || 0;

  const hed     = generateHeadline(teams, date, chaosCount, prevChaosCount);
  const summary = generateSummary(teams, date, chaosCount, prevChaosCount);

  document.getElementById('bcDate').textContent = fmtShort(date);
  document.title = `${hed} | Track The Season`;

  /* Update OG */
  const setMeta=(p,v)=>{document.querySelectorAll(`meta[property="${p}"],meta[name="${p}"]`).forEach(el=>el.setAttribute('content',v));};
  setMeta('og:title',hed+' | Track The Season');
  setMeta('og:description',summary);
  setMeta('description',summary);
  document.querySelector('link[rel="canonical"]').href=`https://tracktheseason.com/pulse/${date}`;

  /* Update schema */
  const schema=document.getElementById('schemaScript');
  if(schema){const obj=JSON.parse(schema.textContent);obj.headline=hed;obj.description=summary;
    obj.datePublished=date;obj.dateModified=date;schema.textContent=JSON.stringify(obj,null,2);}

  const pageUrl = `https://tracktheseason.com/pulse/${date}`;
  const shareText = `${hed}\n\n${summary}\n\nFull report: ${pageUrl}\n\n#TrackTheSeason #MLB`;
  const shareBtns = `
    <button class="share-btn primary" onclick="shareThis()">⬆ Share</button>
    <a class="share-btn ghost" href="https://x.com/intent/tweet?text=${encodeURIComponent(shareText)}" target="_blank" rel="noopener">𝕏 X</a>
    <a class="share-btn ghost" href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(pageUrl)}" target="_blank" rel="noopener">Facebook</a>
    <button class="share-btn ghost" onclick="copyLink()">⧉ Copy Link</button>`;

  /* Date nav: prev/next */
  const idx = availableDates.indexOf(date);
  const newerDate = idx>0 ? availableDates[idx-1] : null;
  const olderDate = idx<availableDates.length-1 ? availableDates[idx+1] : null;
  const dateNavHtml = `
    <div class="pulse-date-nav">
      ${olderDate?`<a class="date-nav-btn" href="/pulse/${olderDate}">← ${fmtShort(olderDate)}</a>`:''}
      <span class="date-nav-btn active">${fmtShort(date)}</span>
      ${newerDate?`<a class="date-nav-btn" href="/pulse/${newerDate}">${fmtShort(newerDate)} →</a>`:''}
    </div>`;

  /* Rivalry cards */
  const rivalryHtml = renderRivalrySection(teams);

  /* Movers */
  const upHtml   = renderMoversSection(teams,'up');
  const downHtml = renderMoversSection(teams,'down');

  const noDeltaNotice = !hasPrev ? `
    <div style="background:rgba(245,200,66,.06);border:1px solid rgba(245,200,66,.15);
      border-radius:var(--r-md);padding:10px 14px;margin:12px 0;
      font-family:var(--mono);font-size:11px;color:rgba(245,200,66,.7);line-height:1.6">
      ⚠️ This is the first stored snapshot. Overnight deltas will be available from tomorrow's report.
    </div>` : '';

  setRoot(`
    <!-- ARTICLE HEADER -->
    <div class="pulse-header">
      <div class="pulse-eyebrow"><div class="pulse-dot"></div>MLB Daily Pulse</div>
      <h1 class="pulse-hed">${hed}</h1>
      <p class="pulse-summary">${summary}</p>
      <div class="pulse-meta">
        <span>${fmt(date)}</span>
        <span>·</span>
        <span>~45 second read</span>
        ${hasPrev?`<span>·</span><span>Compared to ${fmtShort(prevDate)}</span>`:''}
      </div>
      <div class="share-bar">${shareBtns}</div>
      ${dateNavHtml}
    </div>
    ${noDeltaNotice}

    <!-- SECTION 1: BIGGEST MOVERS -->
    <div class="pulse-section">
      <div class="sec-eyebrow">Section 1</div>
      <div class="sec-title">📈 Biggest Movers</div>
      <div class="mover-list">${upHtml}</div>
    </div>

    <!-- SECTION 2: BIGGEST FALLERS -->
    <div class="pulse-section">
      <div class="sec-eyebrow">Section 2</div>
      <div class="sec-title">📉 Biggest Fallers</div>
      <div class="mover-list">${downHtml}</div>
    </div>

    <!-- SECTION 3: CHAOS INDEX -->
    <div class="pulse-section">
      <div class="sec-eyebrow">Section 3</div>
      <div class="sec-title">⚡ Chaos Index</div>
      ${renderChaosSection(chaosCount, prevChaosCount, gp)}
    </div>

    ${rivalryHtml ? `
    <!-- SECTION 4: RIVALRY WATCH -->
    <div class="pulse-section">
      <div class="sec-eyebrow">Section 4</div>
      <div class="sec-title">⚔️ Rivalry Watch</div>
      <div class="rivalry-delta-list">${rivalryHtml}</div>
    </div>` : ''}

    <!-- SECTION 5: NUMBER OF THE DAY -->
    <div class="pulse-section">
      <div class="sec-eyebrow">Section 5</div>
      <div class="sec-title">💡 Number of the Day</div>
      ${renderNotdSection(teams, chaosCount, prevChaosCount)}
    </div>

    <!-- ARCHIVE + BOTTOM SHARE -->
    <div class="pulse-section">
      <div class="share-bar">${shareBtns}</div>
    </div>
    ${renderArchiveNavHtml(availableDates, date)}
  `);

  /* Wire global share functions */
  window.shareThis = async function(){
    if(navigator.share) try{await navigator.share({title:hed,text:summary,url:pageUrl});}
    catch(e){if(e.name!=='AbortError')console.warn(e);}
    else { const ok=await copyToClipboard(shareText); alert(ok?'Copied!':'Could not copy'); }
  };
  window.copyLink = async function(){
    const ok=await copyToClipboard(pageUrl);
    document.querySelectorAll('.share-btn.ghost').forEach(b=>{
      if(b.textContent.includes('Copy')){b.textContent=ok?'✓ Copied!':'⧉ Copy Link';
      setTimeout(()=>b.textContent='⧉ Copy Link',2000);}
    });
  };
}

/* ══ MAIN ═══════════════════════════════════════════════════ */
async function main(){
  renderLoading();

  /* Extract date from URL: /pulse/YYYY-MM-DD or /pulse */
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  const dateParam = pathParts[1] || null; // "2026-06-12" or null

  let data;
  try {
    const apiUrl = `/api/pulse-data${dateParam ? `?date=${dateParam}` : ''}`;
    const res = await fetch(apiUrl);
    data = await res.json();
    /* Surface API errors clearly */
    if(data.error){
      setRoot(`<div class="state-box">
        <div class="state-label" style="color:#f47570">Pulse data unavailable</div>
        <div class="state-sub" style="margin-top:12px">${data.error}</div>
        ${data.hint?`<div class="state-sub" style="margin-top:8px;color:rgba(245,200,66,.7)">${data.hint}</div>`:''}
        <a href="/" style="display:inline-block;margin-top:20px;color:var(--signal);font-family:var(--mono);font-size:12px">← Back to Homepage</a>
      </div>`);
      return;
    }
  } catch(e) {
    setRoot(`<div class="state-box"><div class="state-label" style="color:#f47570">Could not load Pulse data.</div>
      <div class="state-sub">${e.message}</div></div>`);
    return;
  }

  /* No snapshots at all yet */
  if(!data.found && (!data.availableDates || !data.availableDates.length)){
    renderComingSoon([]);
    return;
  }

  /* Specific date not found */
  if(!data.found){
    renderComingSoon(data.availableDates);
    return;
  }

  /* Render the article */
  renderArticle(data);
}

main();
</script>
